# /proxy-gateway/nginx.conf

events {
    worker_connections 1024;
}

http {
    # ---------------------------------------------------------
    # APP 1: THE FRONTEND (movie-trip.kurangdoa.com)
    # ---------------------------------------------------------
    server {
        listen 80;
        server_name movie-trip.kurangdoa.com;
        
        # return 301 https://$host$request_uri;

        # The trapdoor for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/ {
            proxy_pass http://backend:8000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 443 ssl;
        server_name movie-trip.kurangdoa.com;
        ssl_certificate /etc/letsencrypt/live/movie-trip.kurangdoa.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/movie-trip.kurangdoa.com/privkey.pem;
        
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
        }
    }

    # ---------------------------------------------------------
    # APP 2: LANGFUSE OBSERVABILITY (langfuse.kurangdoa.com)
    # ---------------------------------------------------------
    server {
        listen 80;
        server_name langfuse.kurangdoa.com;
        
        # return 301 https://$host$request_uri;

        # The trapdoor for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://langfuse-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 443 ssl;
        server_name langfuse.kurangdoa.com;
        ssl_certificate /etc/letsencrypt/live/langfuse.kurangdoa.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/langfuse.kurangdoa.com/privkey.pem;
        
        location / {
            proxy_pass http://langfuse-web:3000;
            proxy_set_header Host $host;
        }
    }

    # ---------------------------------------------------------
    # APP 3: MLFLOW TRACKING SERVER (mlflow.kurangdoa.com)
    # ---------------------------------------------------------
    server {
        listen 80;
        server_name mlflow.kurangdoa.com;
        
        # return 301 https://$host$request_uri;

        # The trapdoor for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://mlflow-server:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 443 ssl;
        server_name mlflow.kurangdoa.com;
        ssl_certificate /etc/letsencrypt/live/mlflow.kurangdoa.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mlflow.kurangdoa.com/privkey.pem;
        
        location / {
            proxy_pass http://mlflow-server:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}