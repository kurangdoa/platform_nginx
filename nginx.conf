# /proxy-gateway/nginx.conf

events {
    worker_connections 1024;
}

http {
    # ---------------------------------------------------------
    # APP 1: THE FRONTEND (movie-trip.kurangdoa.com)
    # ---------------------------------------------------------
    server {
        listen 80;
        server_name movie-trip.kurangdoa.com;
        
        # Redirect HTTP to HTTPS (Uncomment once SSL is active)
        # return 301 https://$host$request_uri;

        location / {
            # Routes to your frontend container on port 3000
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # (Optional) HTTPS block for Frontend - Uncomment after running Certbot
    server {
        listen 443 ssl;
        server_name movie-trip.kurangdoa.com;
        ssl_certificate /etc/letsencrypt/live/movie-trip.kurangdoa.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/movie-trip.kurangdoa.com/privkey.pem;
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
        }
    }

    # ---------------------------------------------------------
    # APP 2: LANGFUSE OBSERVABILITY (langfuse.kurangdoa.com)
    # ---------------------------------------------------------
    server {
        listen 80;
        server_name langfuse.kurangdoa.com;
        
        # Redirect HTTP to HTTPS (Uncomment once SSL is active)
        # return 301 https://$host$request_uri;

        location / {
            # Routes to your Langfuse container on port 3000
            proxy_pass http://langfuse-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ---------------------------------------------------------
    # APP 2: MLFLOW OBSERVABILITY (mlflow.kurangdoa.com)
    # ---------------------------------------------------------
    # (Optional) HTTPS block for MLflow - Uncomment after running Certbot
    server {
        listen 443 ssl;
        server_name mlflow.kurangdoa.com;
        ssl_certificate /etc/letsencrypt/live/mlflow.kurangdoa.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mlflow.kurangdoa.com/privkey.pem;
        
        location / {
            proxy_pass http://mlflow-server:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # (Optional) HTTPS block for Langfuse - Uncomment after running Certbot
    server {
        listen 443 ssl;
        server_name langfuse.kurangdoa.com;
        ssl_certificate /etc/letsencrypt/live/langfuse.kurangdoa.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/langfuse.kurangdoa.com/privkey.pem;
        location / {
            proxy_pass http://langfuse-web:3000;
            proxy_set_header Host $host;
        }
    }
}